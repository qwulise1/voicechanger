name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build Android artifacts
        shell: bash
        run: ./ci/build-android.sh

      - name: Package release bundle
        shell: bash
        run: ./ci/package-release-bundle.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module/build/outputs/apk/clean/release/*.apk
            build/ci/qwulivoice-*-release-bundle.zip
          generate_release_notes: true
