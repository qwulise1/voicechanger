name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build companion and module APKs
        run: gradle --no-daemon :app:assembleDebug :module:assembleDebug

      - name: Upload companion APK
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-companion-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload module APK
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-module-debug
          path: module/build/outputs/apk/debug/*.apk
