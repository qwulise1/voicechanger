name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android native toolchain
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Print toolchain versions
        run: |
          java -version
          gradle --version

      - name: Build module APK variants
        shell: bash
        run: ./ci/build-android.sh

      - name: Package release bundle
        if: success()
        shell: bash
        run: ./ci/package-release-bundle.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build/ci/android-build.log
          if-no-files-found: warn

      - name: Upload clean debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwulivoice-beta-debug
          path: module/build/outputs/apk/clean/debug/*.apk

      - name: Upload beta release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwulivoice-beta-release
          path: module/build/outputs/apk/clean/release/*.apk

      - name: Upload release bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwulivoice-release-bundle
          path: build/ci/qwulivoice-*-release-bundle.zip

      - name: Upload root audio module
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qwulivoice-root-audio-module
          path: build/ci/qwulivoice-root-audio-module.zip

      - name: Publish latest artifacts branch
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail
          out_dir="$(mktemp -d)"
          cp module/build/outputs/apk/clean/release/*.apk "$out_dir/qwulivoice-beta-release.apk"
          cp module/build/outputs/apk/clean/debug/*.apk "$out_dir/qwulivoice-beta-debug.apk"
          cp build/ci/qwulivoice-root-audio-module.zip "$out_dir/qwulivoice-root-audio-module.zip"
          cp build/ci/qwulivoice-*-release-bundle.zip "$out_dir/"
          cp build/ci/android-build.log "$out_dir/android-build.log"
          cat > "$out_dir/README.txt" <<EOF
          qwulivoice latest build
          Commit: ${GITHUB_SHA}
          Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          Install one release APK from this folder.
          Release APKs are CI debug-key signed test builds:
          - qwulivoice-beta-release.apk: package com.qwulivoice.beta
          - qwulivoice-root-audio-module.zip: KernelSU Next / Magisk root audio module
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan latest-artifacts
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R "$out_dir"/. .
          git add -A
          git commit -m "Publish latest artifacts for ${GITHUB_SHA}"
          git push --force origin latest-artifacts
