name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android native toolchain
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Print toolchain versions
        run: |
          java -version
          gradle --version

      - name: Build companion and module APKs
        shell: bash
        run: ./ci/build-android.sh

      - name: Package release bundle
        if: success()
        shell: bash
        run: ./ci/package-release-bundle.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build/ci/android-build.log
          if-no-files-found: warn

      - name: Upload companion APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-companion-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload companion release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-companion-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload module APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-module-debug
          path: module/build/outputs/apk/debug/*.apk

      - name: Upload module release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-module-release
          path: module/build/outputs/apk/release/*.apk

      - name: Upload release bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: voicechanger-release-bundle
          path: build/ci/voicechanger-*-release-bundle.zip
